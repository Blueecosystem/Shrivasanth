<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Annual Membership Form | Blue Ecosystem Journal</title>
<style>
body{
font-family:Arial,sans-serif;
background:#eef5ff;
padding:30px;
}
.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1{
text-align:center;
color:#0056b3;
}
input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}
button{
background:#0056b3;
color:white;
padding:12px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#003f82;
}
</style>
</head>
<body>

<div class="container">

<h1>Annual Membership Registration</h1>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Designation</label>
<input type="text" name="designation">

<label>Institution/Organization</label>
<input type="text" name="institution">

<label>Email Address</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone">

<label>Country</label>
<input type="text" name="country">

<label>Membership Type</label>
<select name="membership">
<option>Student Membership</option>
<option>Professional Membership</option>
<option>Institutional Membership</option>
</select>

<label>Research Area</label>
<textarea name="researcharea"></textarea>

<button type="submit">Submit Membership Application</button>

</form>

</div>

</body>
</html>
